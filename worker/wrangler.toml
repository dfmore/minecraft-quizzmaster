# =====================================================
# Minecraft QuizzMaster — Cloudflare Worker config
# =====================================================

name            = "minecraft-quizzmaster-proxy"
main            = "index.js"
compatibility_date = "2024-01-01"

# Deploy this worker:
#   cd worker
#   wrangler deploy
#
# Set your Perplexity API key (stored securely, never in this file):
#   wrangler secret put PERPLEXITY_API_KEY
#
# After setting the key, update ALLOWED_ORIGINS in index.js
# with your actual GitHub Pages URL before production deploy:
#   const ALLOWED_ORIGINS = ["https://yourusername.github.io"];
